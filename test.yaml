---
# Source: vaultwarden/templates/workload/deployment.yaml
# --------------------------------------------------------------------------------- Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: release-name-vaultwarden
  labels:
    helm.sh/chart: vaultwarden-1.0.0
    app.kubernetes.io/name: release-name-vaultwarden
    app.kubernetes.io/instance: release-name
    app.kubernetes.io/version: "1.36.0"
    app.kubernetes.io/managed-by: Helm
    
  annotations:
    
spec:
  replicas: 1
  revisionHistoryLimit: 1
  minReadySeconds: 10
  selector:
    matchLabels:
      app.kubernetes.io/name: release-name-vaultwarden
      app.kubernetes.io/instance: release-name
  template:
    metadata:
      annotations:
        
      labels:
        app.kubernetes.io/name: release-name-vaultwarden
        app.kubernetes.io/instance: release-name
        
    spec:
      
      nodeSelector:
        kubernetes.io/os: linux
      
      
      
      
      
      
      
      serviceAccountName: sa-release-name-vaultwarden
      imagePullSecrets:
        
      volumes:
        - name: data
          emptyDir: {}
      containers:
        - name: vaultwarden
          image: docker.io/vaultwarden/server:1.34.3
          imagePullPolicy: "Always"
          resources:
            limits:
              memory: 512Mi
            requests:
              memory: 256Mi
          ports:
            - name: "http"
              containerPort: 80
              protocol: TCP
            - name: "websocket"
              containerPort: 3012
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: "/data"
          startupProbe:
            failureThreshold: 30
            httpGet:
              path: /
              port: http
            periodSeconds: 5
            successThreshold: 1
            timeoutSeconds: 1
          livenessProbe:
            failureThreshold: 10
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
          readinessProbe:
            failureThreshold: 3
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            successThreshold: 1
            timeoutSeconds: 1
