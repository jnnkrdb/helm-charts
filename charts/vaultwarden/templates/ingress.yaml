{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v -}}
{{- $ing := $main.ingress -}}

{{- if $ing.enabled -}}
--- # --------------------------------------------------------------------------------- Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    {{- include "vaultwarden.defaultLabels" . | nindent 4 }}
    {{- include "vaultwarden.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $main.labels 
                          $ing.labels) ) | nindent 4 }}
  annotations:
    {{- include "vaultwarden.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $main.annotations 
                          $ing.annotations) ) | nindent 4 }}
spec:
  {{- if $ing.tls.enabled }}
  tls:
    - hosts:
        - {{ $ing.host | quote }}
      {{- with $ing.tls.secretName }}
      secretName: {{ . | quote }}
      {{- end }}
  {{- end }}
  ingressClassName: {{ include "vaultwarden.firstOf" (
                        dict "items" ( list $global.ingressClassName 
                                            $ing.ingressClassName )) }}
  rules:
    - host: {{ $ing.host }}
      http:
        paths:
          - path: /notifications/hub
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "vaultwarden.fullname" . }}
                port:
                  name: websocket
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "vaultwarden.fullname" . }}
                port:
                  name: http
{{- end -}}