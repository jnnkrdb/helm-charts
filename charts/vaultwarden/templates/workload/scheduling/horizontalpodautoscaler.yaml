{{- $global := .Values.global -}}
{{- $main := .Values -}}
{{- $wl := $main.workload -}}
{{- $hpa := $main.hpa -}}

{{- if not $wl.replicaCount -}}
{{- if has (include "vaultwarden.workloadKind" ( dict "kind" $wl.kind )) ( list "Deployment" "StatefulSet" ) -}}
--- # --------------------------------------------------------------------------------- HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "vaultwarden.fullname" . }}
  labels:
    {{- include "vaultwarden.defaultLabels" . | nindent 4 }}
    {{- include "vaultwarden.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $main.labels 
                          $hpa.labels) ) | nindent 4 }}
  annotations:
    {{- include "vaultwarden.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $main.annotations 
                          $hpa.annotations) ) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ include "vaultwarden.workloadKind" ( dict "kind" $wl.kind ) }}
    name: {{ include "vaultwarden.fullname" . }}
  minReplicas: {{ $hpa.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas }}
  {{- with $hpa.metrics }}
  metrics:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}