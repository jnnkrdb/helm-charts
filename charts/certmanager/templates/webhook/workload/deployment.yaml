{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.webhook -}}
{{- $wl := $main.workload -}}
{{- $pod := $main.pod -}}

{{- if (eq (include "certmanager.workloadKind" ( dict "kind" $wl.kind )) "Deployment") -}}
--- # --------------------------------------------------------------------------------- Deployment
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "certmanager.fullname" . }}-webhook
  labels:
    app: webhook
    {{- include "certmanager.defaultLabels" . | nindent 4 }}
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $wl.labels) ) | nindent 4 }}
  annotations:
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $wl.annotations) ) | nindent 4 }}
spec:
  {{- with $wl.replicaCount }}
  replicas: {{ . }}
  {{- end }}
  {{- with $wl.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with $wl.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  {{- with $wl.progressDeadlineSeconds }}
  progressDeadlineSeconds: {{ . }}
  {{- end }}
  {{- with $wl.updateStrategy }}
  strategy:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: webhook
      {{- include "certmanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "certmanager.keyValues" ( 
            dict "kvs" ( list $global.annotations 
                              $v.annotations
                              $main.annotations 
                              $wl.annotations
                              $pod.annotations) ) | nindent 8 }}
      labels:
        app: webhook
        {{- include "certmanager.selectorLabels" . | nindent 8 }}
        {{- include "certmanager.keyValues" ( 
            dict "kvs" ( list $global.labels 
                              $v.labels
                              $main.labels
                              $wl.labels
                              $pod.labels) ) | nindent 8 }}
    spec:
      {{- include "webhook.pod" . | nindent 6 }}
{{- end -}}