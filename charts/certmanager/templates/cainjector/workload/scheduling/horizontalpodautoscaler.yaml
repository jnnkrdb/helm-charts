{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.cainjector -}}
{{- $wl := $main.workload -}}
{{- $hpa := $main.hpa -}}

{{- if not $wl.replicaCount -}}
{{- if has (include "certmanager.workloadKind" ( dict "kind" $wl.kind )) ( list "Deployment" "StatefulSet" ) -}}
--- # --------------------------------------------------------------------------------- HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "certmanager.fullname" . }}-cainjector
  labels:
    app: cainjector
    {{- include "certmanager.defaultLabels" . | nindent 4 }}
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $hpa.labels) ) | nindent 4 }}
  annotations:
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $hpa.annotations) ) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ include "certmanager.workloadKind" ( dict "kind" $wl.kind ) }}
    name: {{ include "certmanager.fullname" . }}-cainjector
  minReplicas: {{ $hpa.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas }}
  {{- with $hpa.metrics }}
  metrics:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}