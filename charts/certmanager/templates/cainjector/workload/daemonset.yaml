{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.cainjector -}}
{{- $wl := $main.workload -}}
{{- $pod := $main.pod -}}

{{- if (eq (include "certmanager.workloadKind" ( dict "kind" $wl.kind )) "DaemonSet") -}}
--- # --------------------------------------------------------------------------------- DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "certmanager.fullname" . }}-cainjector
  labels:
    app: cainjector
    {{- include "certmanager.defaultLabels" . | nindent 4 }}
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $wl.labels) ) | nindent 4 }}
  annotations:
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $wl.annotations) ) | nindent 4 }}
spec:
  {{- with $wl.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with $wl.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  {{- with $wl.updateStrategy }}
  updateStrategy:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app: cainjector
      {{- include "certmanager.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "certmanager.keyValues" ( 
            dict "kvs" ( list $global.annotations 
                              $v.annotations 
                              $main.annotations 
                              $wl.annotations
                              $pod.annotations) ) | nindent 8 }}
      labels: 
        app: cainjector
        {{- include "certmanager.selectorLabels" . | nindent 8 }}
        {{- include "certmanager.keyValues" ( 
            dict "kvs" ( list $global.labels 
                              $v.labels 
                              $main.labels 
                              $wl.labels
                              $pod.labels) ) | nindent 8 }}
    spec:
      {{- include "cainjector.pod" . | nindent 6 }}
{{- end -}}