{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.cainjector -}}

--- # --------------------------------------------------------------------------------- RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "certmanager.fullname" . }}-cainjector:leaderelection
  labels:
    app: cainjector
    {{- include "certmanager.defaultLabels" . | nindent 4 }}
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels ) ) | nindent 4 }}
  annotations:
    {{- include "certmanager.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations ) ) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "certmanager.fullname" . }}-cainjector:leaderelection
subjects:
- name: sa-{{ include "certmanager.fullname" . }}-cainjector
  namespace: {{ .Release.Namespace }}
  kind: ServiceAccount