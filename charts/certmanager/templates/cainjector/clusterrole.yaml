{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.cainjector -}}

--- # --------------------------------------------------------------------------------- ClusterRole
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "common.fullname" . }}-cainjector
  labels:
    app: cainjector
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations ) ) | nindent 4 }}
rules:
# -------------------------------------------------------------------------------------------------------------------- cert-manager.io / certificates
  - apiGroups: [ "cert-manager.io" ]
    resources: [ "certificates" ]
    verbs: [ "get", "list", "watch" ]
    
# -------------------------------------------------------------------------------------------------------------------- core / secrets, events
  - apiGroups: [ "" ]
    resources: [ "secrets" ]
    verbs: [ "get", "list", "watch" ]
  - apiGroups: [ "" ]
    resources: [ "events" ]
    verbs: [ "get", "create", "update", "patch" ]

# -------------------------------------------------------------------------------------------------------------------- admissionregistration.k8s.io / validatingwebhookconfigurations, mutatingwebhookconfigurations
  - apiGroups: [ "admissionregistration.k8s.io" ]
    resources: [ "validatingwebhookconfigurations", "mutatingwebhookconfigurations" ]
    verbs: [ "get", "list", "watch", "update" ]

# -------------------------------------------------------------------------------------------------------------------- apiregistration.k8s.io / apiservices
  - apiGroups: [ "apiregistration.k8s.io" ]
    resources: [ "apiservices" ]
    verbs: [ "get", "list", "watch", "update" ]

# -------------------------------------------------------------------------------------------------------------------- apiextensions.k8s.io / customresourcedefinitions
  - apiGroups: [ "apiextensions.k8s.io" ]
    resources: [ "customresourcedefinitions" ]
    verbs: [ "get", "list", "watch", "update" ]