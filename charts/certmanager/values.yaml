    labels: {}
    unhealthyPodEvictionPolicy: AlwaysAllow
    minAvailable: null
    maxUnavailable: 1

  # --------------------------------------------------------------------------------------------------
  # HORIZONTAL POD AUTOSCALER CONFIGURATION
  hpa:
    enabled: true
    annotations: {}
    labels: {}
    minReplicas: 1
    maxReplicas: 2
    metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # --------------------------------------------------------------------------------------------------
  # RBAC CONFIGURATION
  rbac:
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true

# --------------------------------------------------------------------------------------------------
# WEBHOOK CONFIGURATION
webhook:
  annotations: {}
  labels: {}

  # --------------------------------------------------------------------------------------------------
  # WORKLOAD CONFIGURATION
  workload:
    annotations: {}
    labels: {}
    # supports either Deployment, StatefulSet or DaemonSet
    kind: Deployment
    revisionHistoryLimit: 1
    replicaCount: 1
    minReadySeconds: 10
    serviceName: null
    podManagementPolicy: null
    persistentVolumeClaimRetentionPolicy: null
    progressDeadlineSeconds: null
    volumeClaimTemplates: []
    updateStrategy:
      type: Recreate

  # --------------------------------------------------------------------------------------------------
  # POD CONFIGURATION
  pod:
    # ------------- more advanced configs
    # Scheduling constraints
    affinity: {}
    tolerations: []
    nodeSelector:
      kubernetes.io/os: linux

    # Network
    hostNetwork: null
    dnsPolicy: null
    dnsConfig: {}
    hostAliases: []

    nodeName: null
    hostname: null
    subdomain: null
    automountServiceAccountToken: null
    terminationGracePeriodSeconds: null

    # Pod-level security context (applies to all containers unless container-level overrides)
    securityContext:
      runAsNonRoot: true
      seccompProfile:
        type: RuntimeDefault

    # Runtime, priority, scheduler
    runtimeClassName: null
    priorityClassName: null
    schedulerName: null

    # Process & service-related settings
    shareProcessNamespace: null
    enableServiceLinks: null

    # ------------- more frequently used configs
    labels: {}
    annotations: {}
    imagePullSecrets: []
    initContainers: []
    extraVolumes: []
    extraVolumeMounts: []
    sidecarContainers: []
    extraEnvs: []
    extraEnvFrom: []

  # --------------------------------------------------------------------------------------------------
  # CONTAINER CONFIGURATION
  containers:
    webhook:
      command: []
      args:
      - --v=2
      - --secure-port=$(CERT_MANAGER_SECURE_PORT)
      - --dynamic-serving-ca-secret-namespace=$(POD_NAMESPACE)
      - --dynamic-serving-ca-secret-name=$(CERT_MANAGER_HELM_FULLNAME)-webhook-ca
      - --dynamic-serving-dns-names=$(CERT_MANAGER_HELM_FULLNAME)-webhook
      - --dynamic-serving-dns-names=$(CERT_MANAGER_HELM_FULLNAME)-webhook.$(POD_NAMESPACE)
      - --dynamic-serving-dns-names=$(CERT_MANAGER_HELM_FULLNAME)-webhook.$(POD_NAMESPACE).svc
      workingDir: null
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
          - ALL
      extraEnvs: []
      extraEnvFrom: []
      extraVolumeMounts: []
      startupProbe:
        httpGet:
          path: /livez
          port: healthz
          scheme: HTTP
        periodSeconds: 10
        timeoutSeconds: 1
        successThreshold: 1
        failureThreshold: 15
      livenessProbe:
        httpGet:
          path: /livez
          port: healthz
          scheme: HTTP
        periodSeconds: 10
        timeoutSeconds: 1
        successThreshold: 1
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /healthz
          port: healthz
          scheme: HTTP
        periodSeconds: 5
        timeoutSeconds: 1
        successThreshold: 1
        failureThreshold: 3

  # --------------------------------------------------------------------------------------------------
  # SERVICE CONFIGURATION
  service:
    annotations: {}
    labels: {}
    type: ClusterIP
    clusterIP: null
    ports:
      https:
        port: 443
        protocol: TCP
        nodePort: null
        hostPort: null
      healthz:
        port: 6080
        protocol: TCP
        nodePort: null
        hostPort: null
    publishNotReadyAddresses: null
    ipFamilyPolicy: null
    ipFamilies: []

  # --------------------------------------------------------------------------------------------------
  # PDB CONFIGURATION
  pdb:
    enabled: false
    annotations: {}
    labels: {}
    unhealthyPodEvictionPolicy: AlwaysAllow
    minAvailable: null
    maxUnavailable: 1

  # --------------------------------------------------------------------------------------------------
  # HORIZONTAL POD AUTOSCALER CONFIGURATION
  hpa:
    enabled: true
    annotations: {}
    labels: {}
    minReplicas: 1
    maxReplicas: 2
    metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 80

  # --------------------------------------------------------------------------------------------------
  # RBAC CONFIGURATION
  rbac:
    serviceAccount:
      annotations: {}
      labels: {}
      automountServiceAccountToken: true
    crb:
      annotations: {}
      labels: {}
    cr:
      annotations: {}
      labels: {}
