    labels: {}
    annotations: {}
    imagePullSecrets: []
    initContainers: []
    extraVolumes: []
    extraVolumeMounts: []
    sidecarContainers: []
    extraEnvs: []
    extraEnvFrom: []

  # --------------------------------------------------------------------------------------------------
  # CONTAINER CONFIGURATION
  containers:
    controller:
      command: []
      args:
      - --v=2
      - --cluster-resource-namespace=$(POD_NAMESPACE)
      - --leader-election-namespace=$(POD_NAMESPACE)
      workingDir: null
      resources: {}
      securityContext:
        allowPrivilegeEscalation: false
        capabilities:
          drop:
