{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.server -}}
{{- $rbac := $main.rbac -}}

--- # --------------------------------------------------------------------------------- ClusterRoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "common.fullname" . }}-server
  labels:
    app.kubernetes.io/component: server
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels
                          $rbac.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations
                          $rbac.annotations ) ) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "common.fullname" . }}-server
subjects:
  - kind: ServiceAccount
    name: sa-{{ include "common.fullname" . }}-server
    namespace: {{ .Release.Namespace }}