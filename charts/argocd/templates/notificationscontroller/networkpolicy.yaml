{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.notificationscontroller -}}
{{- $svc := $main.service -}}

--- # --------------------------------------------------------------------------------- NetworkPolicy
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: {{ include "common.fullname" . }}-notificationscontroller
  labels:
    app.kubernetes.io/component: notifications-controller
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations ) ) | nindent 4 }}
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/component: notifications-controller
      {{- include "common.defaultSelectorLabels" . | nindent 4 }}
  policyTypes:
    - Ingress
  ingress:
    - from:
        - namespaceSelector: {}
      ports:
        - port: {{ $svc.ports.metrics.port }}