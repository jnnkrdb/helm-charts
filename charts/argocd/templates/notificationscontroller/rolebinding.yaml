{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.notificationscontroller -}}
{{- $rbac := $main.rbac -}}

{{- if $main.enabled -}}
--- # --------------------------------------------------------------------------------- RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common.fullname" . }}-notificationscontroller
  labels:
    app.kubernetes.io/component: notifications-controller
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels
                          $rbac.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations
                          $rbac.annotations ) ) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common.fullname" . }}-notificationscontroller
subjects:
  - kind: ServiceAccount
    name: sa-{{ include "common.fullname" . }}-notificationscontroller
    namespace: {{ .Release.Namespace }}
{{- end -}}