{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.notificationscontroller -}}
{{- $wl := $main.workload -}}
{{- $pod := $main.pod -}}

{{- if (eq (include "common.workloadKind" ( dict "kind" $wl.kind )) "DaemonSet") -}}
--- # --------------------------------------------------------------------------------- DaemonSet
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: {{ include "common.fullname" . }}-notificationscontroller
  labels:
    app.kubernetes.io/component: notificationscontroller
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $wl.labels) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $wl.annotations) ) | nindent 4 }}
spec:
  {{- with $wl.revisionHistoryLimit }}
  revisionHistoryLimit: {{ . }}
  {{- end }}
  {{- with $wl.minReadySeconds }}
  minReadySeconds: {{ . }}
  {{- end }}
  {{- with $wl.updateStrategy }}
  updateStrategy:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
  selector:
    matchLabels:
      app.kubernetes.io/component: notificationscontroller
      {{- include "common.defaultSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        {{- include "argocd.configs.checksums" . | nindent 8 }}
        {{- include "common.keyValues" ( 
            dict "kvs" ( list $global.annotations 
                              $v.annotations
                              $main.annotations 
                              $wl.annotations
                              $pod.annotations) ) | nindent 8 }}
      labels: 
        app.kubernetes.io/component: notificationscontroller
        {{- include "common.defaultSelectorLabels" . | nindent 8 }}
        {{- include "common.keyValues" ( 
            dict "kvs" ( list $global.labels 
                              $v.labels
                              $main.labels 
                              $wl.labels
                              $pod.labels) ) | nindent 8 }}
    spec:
      {{- include "argocd.notificationscontroller.pod" . | nindent 6 }}
{{- end -}}