{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.argocd -}}
{{- $cm := (index $main "argocd-cmd-params-cm") -}}

--- # --------------------------------------------------------------------------------- ConfigMap
apiVersion: v1
kind: ConfigMap
metadata: 
  name: argocd-cmd-params-cm
  labels:
    app.kubernetes.io/name: argocd-cmd-params-cm
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations ) ) | nindent 4 }}
{{- if $cm.data }}
data:
  {{- range $key, $value := $cm.data }}
  {{- if $value }}
  {{ $key }}: {{ tpl ($value | toString) $ | quote }}
  {{- end }}
  {{- end }}
{{- end }}