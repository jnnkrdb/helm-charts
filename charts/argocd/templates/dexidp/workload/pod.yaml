{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.dexidp -}}
{{- $wl := $main.workload -}}
{{- $pod := $main.pod -}}

{{- if (eq (include "common.workloadKind" ( dict "kind" $wl.kind )) "Pod") -}}
--- # --------------------------------------------------------------------------------- Pod
apiVersion: v1
kind: Pod
metadata:
  name: {{ include "common.fullname" . }}-dexidp
  labels:
    app.kubernetes.io/component: dexidp
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $wl.labels) ) | nindent 4 }}
  annotations:
    {{- include "argocd.configs.checksums" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $wl.annotations) ) | nindent 4 }}
spec:
  {{- include "argocd.dexidp.pod" . | nindent 2 }}
{{- end -}}