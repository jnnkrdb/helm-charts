{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.dexidp -}}
{{- $ing := $main.ingress -}}

{{- if $ing.enabled -}}
--- # --------------------------------------------------------------------------------- Ingress
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "common.fullname" . }}-dexidp
  labels:
    app.kubernetes.io/component: dexidp
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels 
                          $ing.labels) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations 
                          $ing.annotations) ) | nindent 4 }}
spec:
  {{- if $ing.tls.enabled }}
  tls:
    - hosts:
        - {{ $ing.host | quote }}
      {{- with $ing.tls.secretName }}
      secretName: {{ . | quote }}
      {{- end }}
  {{- end }}
  ingressClassName: {{ include "common.firstOf" (
                        dict "items" ( list $global.ingressClassName 
                                            $ing.ingressClassName )) }}
  rules:
    - http:
        paths:
          - path: /
            pathType: ImplementationSpecific
            backend:
              service:
                name: {{ include "common.fullname" . }}-dexidp
                port:
                  name: http
      {{- with $ing.host }}
      host: {{ . | quote }}
      {{- end }}
{{- end -}}