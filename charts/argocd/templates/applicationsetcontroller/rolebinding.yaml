{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.applicationsetcontroller -}}
{{- $rbac := $main.rbac -}}

--- # --------------------------------------------------------------------------------- RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "common.fullname" . }}-applicationsetcontroller
  labels:
    app.kubernetes.io/component: applicationsetcontroller
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels 
                          $main.labels
                          $rbac.labels ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations 
                          $v.annotations 
                          $main.annotations
                          $rbac.annotations ) ) | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "common.fullname" . }}-applicationsetcontroller
subjects:
  - kind: ServiceAccount
    name: sa-{{ include "common.fullname" . }}-applicationsetcontroller
    namespace: {{ .Release.Namespace }}
    