{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.redis -}}
{{- $wl := $main.workload -}}
{{- $hpa := $main.hpa -}}

{{- if $hpa.enabled -}}
{{- if not $wl.replicaCount -}}
{{- if has (include "common.workloadKind" ( dict "kind" $wl.kind )) ( list "Deployment" "StatefulSet" ) -}}
--- # --------------------------------------------------------------------------------- HorizontalPodAutoscaler
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: {{ include "common.fullname" . }}-redis
  labels:
    app.kubernetes.io/component: redis
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" (
        dict "kvs" ( list $global.labels
                          $v.labels
                          $main.labels
                          $hpa.labels) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" (
        dict "kvs" ( list $global.annotations
                          $v.annotations
                          $main.annotations
                          $hpa.annotations) ) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: {{ include "common.workloadKind" ( dict "kind" $wl.kind ) }}
    name: {{ include "common.fullname" . }}-redis
  minReplicas: {{ $hpa.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas }}
  {{- with $hpa.metrics }}
  metrics:
    {{- . | toYaml | nindent 4 }}
  {{- end }}
{{- end -}}
{{- end -}}
{{- end -}}