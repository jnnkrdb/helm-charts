{{- $v := .Values -}}
{{- $global := $v.global -}}
{{- $main := $v.redis -}}

--- # --------------------------------------------------------------------------------- Secret
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "common.fullname" . }}-redis-auth
  labels:
    app.kubernetes.io/component: redis
    {{- include "common.defaultLabels" . | nindent 4 }}
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.labels 
                          $v.labels
                          $main.labels  ) ) | nindent 4 }}
  annotations:
    {{- include "common.keyValues" ( 
        dict "kvs" ( list $global.annotations  
                          $v.annotations
                          $main.annotations ) ) | nindent 4 }}
type: Opaque
data:
  REDIS_PASSWORD: {{ (randAlphaNum 32) | b64enc | quote }}
