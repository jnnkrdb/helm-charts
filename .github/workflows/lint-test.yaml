# .github/workflows/lint-test.yml

name: Lint and Test Charts

on:
  push:
    branches:
      - main
    paths:
      - 'charts/**'
      - '.github/workflows/lint-test.yaml'
  pull_request:
    paths:
      - 'charts/**'
      - '.github/workflows/lint-test.yaml'

jobs:
  lint:
    name: Lint Charts
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.13.0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed charts: $changed"
          fi

      - name: Lint charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct lint --config ct.yaml

  unit-test:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest
        run: helm plugin install https://github.com/helm-unittest/helm-unittest.git --verify=false

      - name: Run unit tests
        env:
          CHART_UNITTEST_DIR: .unittests
          GENERAL_UNITTEST_DIR: unittests
        run: |
          for chart in charts/*/; do
            if [ -d "$chart/$CHART_UNITTEST_DIR" ]; then
              echo "Testing $chart"
              helm unittest "$chart" \
                --file "$chart/$CHART_UNITTEST_DIR/*.unit.yaml" \
                --file "$GENERAL_UNITTEST_DIR/*.unit.yaml" \
                --output-file results.xml \
                --output-type JUnit
            fi
          done

      - name: Publish test results
        uses: mikepenz/action-junit-report@v4
        if: always()
        with:
          report_paths: '**/results.xml'

  policy-test:
    name: Policy Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Install conftest
        run: |
          curl -LO https://github.com/open-policy-agent/conftest/releases/download/v0.68.2/conftest_0.68.2_Linux_x86_64.tar.gz
          tar xzf conftest_0.68.2_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin/

      - name: Run policy tests
        env:
          CHART_POLICIES_DIR: .policy
          GENERAL_POLICIES_DIR: policies
        run: |
          for chart in charts/*/; do
            if [ -d "$GENERAL_POLICIES_DIR" ]; then
              echo "Testing policies for $chart"
              helm template test "$chart" | conftest test - --policy "$GENERAL_POLICIES_DIR"
            fi
            if [ -d "$chart/$CHART_POLICIES_DIR" ]; then
              echo "Testing policies for $chart"
              helm template test "$chart" | conftest test - --policy "$chart/$CHART_POLICIES_DIR"
            fi
          done

  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: [unit-test, policy-test]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Helm
        uses: azure/setup-helm@v4

      - name: Set up chart-testing
        uses: helm/chart-testing-action@v2

      - name: Create kind cluster
        uses: helm/kind-action@v1

      - name: List changed charts
        id: list-changed
        run: |
          changed=$(ct list-changed --config ct.yaml)
          if [[ -n "$changed" ]]; then
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install and test charts
        if: steps.list-changed.outputs.changed == 'true'
        run: ct install --config ct.yaml