# .github/workflows/security-scan.yml
name: Security Scan

on:
  push:
    paths:
      - 'charts/**'
  pull_request:
    paths:
      - 'charts/**'
  #schedule:
  #  - cron: '0 0 * * 0'  # Weekly

jobs:
  kubesec:
    name: Kubesec Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Install kubesec
        run: |
          curl -LO https://github.com/controlplaneio/kubesec/releases/download/v2.13.0/kubesec_linux_amd64.tar.gz
          tar xzf kubesec_linux_amd64.tar.gz
          sudo mv kubesec /usr/local/bin/

      - name: Scan charts
        run: |
          for chart in charts/*/; do
            echo "Scanning $chart"
            helm template test "$chart" | kubesec scan -
          done

  trivy:
    name: Trivy Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: read
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: 'charts/'
          format: 'sarif'
          output: 'trivy-results.sarif'

      - name: Upload Trivy scan results
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'

  checkov:
    name: Checkov Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Helm
        uses: azure/setup-helm@v5

      - name: Template charts
        run: |
          mkdir -p rendered
          for chart in charts/*/; do
            name=$(basename "$chart")
            helm template test "$chart" > rendered/${name}.yaml
          done

      - name: Run Checkov
        uses: bridgecrewio/checkov-action@master
        with:
          directory: rendered/
          framework: kubernetes
          output_format: sarif
          output_file_path: checkov-results.sarif

      - name: Upload Checkov results
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: checkov-results.sarif